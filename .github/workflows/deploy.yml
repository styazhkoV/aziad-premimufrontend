name: Deploy Astro Premium Frontend

on:
  push:
    branches: [ main ]   # деплой при пуше в main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # включаем Node.js 24 для всех экшенов
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0   # Astro требует >=22.12.0 (можно сразу 24)

      - name: Install dependencies
        run: npm ci   # быстрее и надёжнее чем npm install

      - name: Build Astro project
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@alexsandr.stazhkov@gmail.com
